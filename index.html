
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Sprint</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{

  --bg:#edf2f7;
  --bg2:#f8fafc;

  --card:#ffffff;

  --text:#243447;
  --muted:#728096;

  --track:#dbe5ef;
  --track2:#cfd9e5;

  --blue:#7db7ff;
  --blue2:#5f9df7;

  --peach:#ffb4a2;
  --peach2:#ff9b8a;

}

body{

  font-family:'Inter',sans-serif;

  min-height:100vh;

  background:
    linear-gradient(
      180deg,
      #f8fafc 0%,
      #edf2f7 100%
    );

  display:flex;
  justify-content:center;
  align-items:center;

  padding:20px;

  color:var(--text);

}

.game{

  width:100%;
  max-width:720px;

}

.header{

  text-align:center;

  margin-bottom:28px;

}

.header h1{

  font-size:42px;

  font-weight:800;

  letter-spacing:-2px;

  color:#263445;

}

.header p{

  margin-top:10px;

  color:var(--muted);

  font-size:15px;

}

.stats{

  display:grid;

  grid-template-columns:repeat(3,1fr);

  gap:16px;

  margin-bottom:24px;

}

.card{

  background:rgba(255,255,255,.75);

  border-radius:24px;

  padding:18px;

  text-align:center;

  backdrop-filter:blur(10px);

  box-shadow:
    0 10px 30px rgba(40,60,80,.08);

}

.label{

  font-size:11px;

  letter-spacing:.12em;

  text-transform:uppercase;

  color:var(--muted);

  margin-bottom:8px;

}

.value{

  font-size:30px;

  font-weight:800;

}

.track-wrap{

  background:rgba(255,255,255,.72);

  border-radius:32px;

  padding:10px;

  box-shadow:
    0 20px 40px rgba(44,62,80,.08);

}

.lane{

  background:
    linear-gradient(
      180deg,
      rgba(255,255,255,.9),
      rgba(245,248,252,.85)
    );

  border-radius:24px;

  padding:24px;

  margin-bottom:12px;

}

.lane:last-child{

  margin-bottom:0;

}

.lane-top{

  display:flex;

  align-items:center;

  gap:12px;

  margin-bottom:16px;

}

.avatar{

  width:48px;
  height:48px;

  border-radius:50%;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:20px;

}

.you{

  background:#dff1ff;

}

.cpu{

  background:#ffe5df;

}

.name{

  font-weight:700;

  font-size:14px;

  letter-spacing:.04em;

}

.track{

  position:relative;

  height:42px;

  border-radius:999px;

  overflow:hidden;

  background:
    linear-gradient(
      180deg,
      var(--track),
      var(--track2)
    );

}

.fill{

  position:absolute;

  left:0;
  top:0;
  bottom:0;

  width:0%;

  border-radius:999px;

  transition:width .06s linear;

}

.you-fill{

  background:
    linear-gradient(
      90deg,
      var(--blue),
      var(--blue2)
    );

}

.cpu-fill{

  background:
    linear-gradient(
      90deg,
      var(--peach),
      var(--peach2)
    );

}

.runner{

  position:absolute;

  top:50%;

  left:8px;

  transform:translateY(-50%);

  font-size:24px;

  transition:left .06s linear;

  z-index:2;

}

.finish{

  position:absolute;

  right:14px;

  top:50%;

  transform:translateY(-50%);

  opacity:.7;

}

.center{

  text-align:center;

  margin-top:24px;

}

.combo{

  min-height:24px;

  margin-bottom:14px;

  color:#56708c;

  font-weight:700;

  letter-spacing:.04em;

}

.btn{

  width:100%;

  border:none;

  border-radius:28px;

  padding:22px;

  cursor:pointer;

  font-size:20px;

  font-weight:800;

  color:white;

  background:
    linear-gradient(
      135deg,
      #7db7ff,
      #5f9df7
    );

  box-shadow:
    0 16px 30px rgba(95,157,247,.28);

  transition:
    transform .08s,
    box-shadow .2s;

}

.btn:hover{

  transform:translateY(-2px);

}

.btn:active{

  transform:scale(.98);

}

.result{

  margin-top:24px;

  background:rgba(255,255,255,.8);

  border-radius:28px;

  padding:26px;

  text-align:center;

  display:none;

  box-shadow:
    0 10px 30px rgba(44,62,80,.08);

}

.result h2{

  font-size:30px;

  margin-bottom:10px;

}

.result p{

  color:var(--muted);

}

.pulse{

  animation:pulse .9s infinite;

}

@keyframes pulse{

  50%{

    transform:scale(1.03);

  }

}

@media(max-width:640px){

  .header h1{

    font-size:34px;

  }

  .value{

    font-size:24px;

  }

  .btn{

    padding:20px;

    font-size:18px;

  }

}

</style>
</head>
<body>

<div class="game">

  <div class="header">

    <h1>SPRINT</h1>

    <p>Tap as fast as you can and beat the CPU</p>

  </div>

  <div class="stats">

    <div class="card">

      <div class="label">Time</div>

      <div class="value" id="time">10.0</div>

    </div>

    <div class="card">

      <div class="label">Taps</div>

      <div class="value" id="taps">0</div>

    </div>

    <div class="card">

      <div class="label">Best</div>

      <div class="value" id="best">—</div>

    </div>

  </div>

  <div class="track-wrap">

    <div class="lane">

      <div class="lane-top">

        <div class="avatar you">🏃</div>

        <div class="name">YOU</div>

      </div>

      <div class="track">

        <div class="fill you-fill" id="playerFill"></div>

        <div class="runner" id="playerRunner">🏃</div>

        <div class="finish">🏁</div>

      </div>

    </div>

    <div class="lane">

      <div class="lane-top">

        <div class="avatar cpu">🤖</div>

        <div class="name">CPU</div>

      </div>

      <div class="track">

        <div class="fill cpu-fill" id="cpuFill"></div>

        <div class="runner" id="cpuRunner">🤖</div>

        <div class="finish">🏁</div>

      </div>

    </div>

  </div>

  <div class="center">

    <div class="combo" id="combo">

      READY?

    </div>

    <button class="btn pulse" id="btn">

      TAP TO START

    </button>

  </div>

  <div class="result" id="result">

    <h2 id="resultTitle"></h2>

    <p id="resultText"></p>

  </div>

</div>

<script>

let state = "idle";

let taps = 0;

let best = localStorage.getItem("sprintBest") || 0;

let player = 0;

let cpu = 0;

let time = 10;

let timer;
let cpuTimer;

const btn = document.getElementById("btn");

const timeEl = document.getElementById("time");

const tapsEl = document.getElementById("taps");

const bestEl = document.getElementById("best");

const comboEl = document.getElementById("combo");

const playerFill = document.getElementById("playerFill");

const cpuFill = document.getElementById("cpuFill");

const playerRunner = document.getElementById("playerRunner");

const cpuRunner = document.getElementById("cpuRunner");

const result = document.getElementById("result");

const resultTitle = document.getElementById("resultTitle");

const resultText = document.getElementById("resultText");

bestEl.innerText = best || "—";

function setProgress(runner, fill, value){

  value = Math.min(100,value);

  fill.style.width = value + "%";

  const trackWidth = fill.parentElement.clientWidth - 50;

  runner.style.left =
    (value / 100) * trackWidth + "px";

}

function startGame(){

  state = "running";

  taps = 0;

  player = 0;

  cpu = 0;

  time = 10;

  result.style.display = "none";

  tapsEl.innerText = "0";

  timeEl.innerText = "10.0";

  comboEl.innerText = "GO GO GO 🔥";

  setProgress(playerRunner,playerFill,0);

  setProgress(cpuRunner,cpuFill,0);

  btn.innerText = "TAP!";

  btn.classList.remove("pulse");

  const cpuSpeed =
    0.7 + Math.random() * 0.45;

  timer = setInterval(()=>{

    time -= 0.1;

    if(time <= 0){

      endGame();

    }

    timeEl.innerText =
      time.toFixed(1);

  },100);

  cpuTimer = setInterval(()=>{

    cpu += cpuSpeed;

    setProgress(cpuRunner,cpuFill,cpu);

    if(cpu >= 100){

      endGame();

    }

  },80);

}

function tap(){

  if(state === "idle"){

    startGame();

    return;

  }

  if(state === "done"){

    startGame();

    return;

  }

  if(state !== "running") return;

  taps++;

  player += 1.3;

  tapsEl.innerText = taps;

  setProgress(
    playerRunner,
    playerFill,
    player
  );

  if(taps > 75){

    comboEl.innerText =
      "INSANE SPEED ⚡";

  }
  else if(taps > 50){

    comboEl.innerText =
      "SUPER FAST 🚀";

  }
  else if(taps > 25){

    comboEl.innerText =
      "KEEP GOING 🔥";

  }

  if(player >= 100){

    endGame();

  }

}

function endGame(){

  if(state !== "running") return;

  state = "done";

  clearInterval(timer);

  clearInterval(cpuTimer);

  result.style.display = "block";

  if(player > cpu){

    resultTitle.innerText =
      "🏆 YOU WIN";

    resultText.innerText =
      taps + " taps of pure speed.";

  }else{

    resultTitle.innerText =
      "🤖 CPU WINS";

    resultText.innerText =
      "So close. Try again.";

  }

  if(taps > best){

    best = taps;

    localStorage.setItem(
      "sprintBest",
      best
    );

    bestEl.innerText = best;

    comboEl.innerText =
      "NEW RECORD 🎉";

  }else{

    comboEl.innerText =
      "TRY AGAIN";

  }

  btn.innerText =
    "PLAY AGAIN";

  btn.classList.add("pulse");

}

btn.addEventListener(
  "click",
  tap
);

document.addEventListener(
  "keydown",
  (e)=>{

    if([
      "Space",
      "Enter",
      "ArrowUp",
      "ArrowRight"
    ].includes(e.code)){

      e.preventDefault();

      tap();

    }

  }
);

</script>

</body>
</html>
